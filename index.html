<!DOCTYPE html>
<html>
<head>
  <title>Quantum Explorer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Quantum Explorer</h1>

<!-- ENERGY LEVEL SECTION -->
<section>
  <h2>Energy Level Simulator</h2>
  <input type="range" min="1" max="5" id="energySlider">
  <p id="energyOutput">Energy level: n = 1</p>
  <div id="colorBox"></div>
</section>

<!-- ORBITAL SECTION -->
<section>
  <h2>3D Orbital Viewer</h2>
  <button onclick="showOrbital('s')">s orbital</button>
  <button onclick="showOrbital('p')">p orbital</button>
  <button onclick="showOrbital('d')">d orbital</button>

  <div id="viewer" style="width:400px; height:400px; margin:auto;"></div>
</section>

<!-- Three.js CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="script.js"></script>

<!-- QUIZ SECTION -->
<section>
  <h2>Quick Quiz</h2>
  <p id="quizQuestion">Which orbital is spherical?</p>
  <button onclick="checkAnswer('s')">s</button>
  <button onclick="checkAnswer('p')">p</button>
  <button onclick="checkAnswer('d')">d</button>
  <p id="quizResult"></p>
</section>

<script src="script.js"></script>

</body>
</html>
